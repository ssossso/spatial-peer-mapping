{% extends "base.html" %}
{% block content %}

<style>
  .form-label {
    font-size: 14px;
    font-weight: 800;
    color: #111827;
    margin: 0 0 6px 0;
    text-align: left;
  }

  .field { margin-bottom: 14px; text-align: left; }

  .research-outer {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #fafafa;
    padding: 14px;
    margin-bottom: 14px;
    text-align: left;
  }

  .research-box {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    background: #fff;
    padding: 12px;
  }

  .research-stack {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .r-help {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    line-height: 1.45;
    margin: 0 0 8px 0;
  }

  .choice-box {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    box-sizing: border-box;
  }

  .radio-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    column-gap: 12px;
    row-gap: 8px;
  }

  .radio-row label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0;
    white-space: nowrap;
    font-weight: 700;
  }

  .radio-row input { width: auto; }
</style>

<div class="card">
  <h2>교사 회원가입</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="post">
    <div class="field">
      <div class="form-label">아이디</div>
      <input name="username" autocomplete="username">
    </div>

    <div class="field">
      <div class="form-label">비밀번호</div>
      <div class="pw-wrap">
        <input id="pwInput" type="password" name="password"
               autocomplete="new-password" class="pw-input-in">
        <button id="pwToggleBtn" class="pw-in-toggle" type="button"
                aria-label="비밀번호 보기/숨기기" aria-pressed="false">
          <span id="eyeOn" class="eye-icon is-active" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span id="eyeOff" class="eye-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a19.13 19.13 0 0 1-3.13 4.36"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.61 6.61C3.27 9.25 2 12 2 12s3.5 7 10 7c1.09 0 2.12-.17 3.08-.49"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </div>
    </div>

    <div class="field">
      <div class="form-label">비밀번호 확인</div>
      <div class="pw-wrap">
        <input id="pw2Input" type="password" name="password2"
               autocomplete="new-password" class="pw-input-in">
        <button id="pw2ToggleBtn" class="pw-in-toggle" type="button"
                aria-label="비밀번호 확인 보기/숨기기" aria-pressed="false">
          <span id="eye2On" class="eye-icon is-active" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span id="eye2Off" class="eye-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a19.13 19.13 0 0 1-3.13 4.36"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.61 6.61C3.27 9.25 2 12 2 12s3.5 7 10 7c1.09 0 2.12-.17 3.08-.49"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </div>
    </div>

    <hr style="margin:18px 0; border:none; border-top:1px solid #e5e7eb;">

    <div class="research-outer">
      <div class="subtitle" style="margin-bottom:12px;">
        연구 기록과 운영 확인을 위한 추가 정보입니다. 실제 학생 조사에서는 교사 정보가 학생에게 공개되지 않습니다.
      </div>

      <div class="research-box">
        <div class="research-stack">
          <div>
            <div class="form-label">이름</div>
            <div class="r-help">운영자가 교사 계정을 확인할 때 사용하는 이름입니다.</div>
            <input name="research_name" required>
          </div>

          <div>
            <div class="form-label">학교</div>
            <input name="research_school" required>
          </div>

          <div>
            <div class="form-label">교직 경력</div>
            <div class="choice-box">
              <div class="radio-row">
                <label><input type="radio" name="teaching_years" value="1-5" required>1-5년</label>
                <label><input type="radio" name="teaching_years" value="6-10">6-10년</label>
                <label><input type="radio" name="teaching_years" value="11-15">11-15년</label>
                <label><input type="radio" name="teaching_years" value="16+">16년 이상</label>
              </div>
            </div>
          </div>

          <div>
            <div class="form-label">현재 담당 학년</div>
            <div class="choice-box">
              <div class="radio-row">
                <label><input type="radio" name="current_grade" value="4" required>4학년</label>
                <label><input type="radio" name="current_grade" value="5">5학년</label>
                <label><input type="radio" name="current_grade" value="6">6학년</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button>회원가입</button>
  </form>
</div>

{% endblock %}
