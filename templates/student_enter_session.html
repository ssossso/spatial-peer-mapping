{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>학생 입장</h2>
  <p class="subtitle">
    {{ session_label }} 조사 링크로 들어왔습니다. 이름과 개인 코드를 입력하면 시작할 수 있습니다.
  </p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="code" value="{{ code }}">
    <input type="hidden" name="sid" value="{{ sid }}">

    <label style="display:block; text-align:left; font-weight:800; margin-bottom:6px;">학급 코드</label>
    <input value="{{ code }}" disabled><br><br>

    <label style="display:block; text-align:left; font-weight:800; margin-bottom:6px;">회차</label>
    <input value="{{ session_label }}" disabled><br><br>

    <label style="display:block; text-align:left; font-weight:800; margin-bottom:6px;">이름</label>
    <input name="name" placeholder="학생 이름" autocomplete="off"><br><br>

    <label style="display:block; text-align:left; font-weight:800; margin-bottom:6px;">개인 코드(6자리)</label>
    <input name="pin" placeholder="예: 123456" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="off">
    <div class="muted" style="font-size:12px; margin-top:6px; display:block;">담임 선생님이 알려준 6자리 숫자입니다.</div>
    <br>

    <button>시작하기</button>
  </form>
</div>
{% endblock %}
